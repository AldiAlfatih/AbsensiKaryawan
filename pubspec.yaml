name: absensi_karyawan
description: "Aplikasi absensi karyawan modern dengan geofencing dan anti-spoofing GPS."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.14.0
  firebase_auth: ^5.5.3
  firebase_database: ^11.3.5

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Location & Geofencing
  geolocator: ^13.0.2
  permission_handler: ^11.4.0

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2

  # Utilities
  intl: ^0.20.2
  csv: ^8.0.0
  path_provider: ^2.1.5
  share_plus: ^12.0.2
  image_picker: ^1.2.1
  image: ^4.8.0
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
